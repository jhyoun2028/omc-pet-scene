<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent !important; overflow: hidden; pointer-events: none; }
    #root { width: 100vw; background: transparent; pointer-events: none; }
    #root > div { background: transparent !important; }
    svg { background: transparent !important; pointer-events: none; }
    #root button { pointer-events: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./omc-webview.js"></script>
</body>
</html>
